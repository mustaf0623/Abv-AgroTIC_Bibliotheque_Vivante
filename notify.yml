# ══════════════════════════════════════════════════════════════════
#  AgroTIC — Notifications planifiées via Push API avec VAPID
#  Fonctionne même app fermée sur iOS et Android
# ══════════════════════════════════════════════════════════════════

name: AgroTIC Notifications

on:
  schedule:
    # Toutes les 15 minutes entre 07h00 et 22h00 UTC (= 07h-22h Dakar GMT+0)
    # Cron GitHub Actions : minimum 5 min, précision ~1-2 min
    - cron: '0,15,30,45 7-22 * * *'

  # Permet aussi de déclencher manuellement depuis GitHub
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          SUBSCRIPTIONS_JSON: ${{ secrets.PUSH_SUBSCRIPTIONS_JSON }}
        run: node send-push.js
