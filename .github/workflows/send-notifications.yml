name: AgroTIC — Notifications Push

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Envoyer notification via Ntfy
        run: |
          curl -s \
            -H "Title: AgroTIC - Nouvelle notion disponible" \
            -H "Priority: default" \
            -H "Tags: seedling" \
            -d "Une nouvelle notion t'attend. Ouvre l'app pour la decouvrir et gagner des XP !" \
            https://ntfy.sh/agrotic-bibliotheque-vivante-mustaf0623
          echo "[AgroTIC] Notification envoyee avec succes !"
