name: AgroTIC — Notifications Push

on:
  # Déclencher toutes les 45 minutes (même si l'app est fermée/killée)
  schedule:
    - cron: '*/45 * * * *'
  # Permettre aussi le déclenchement manuel (pour tester)
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-push
        run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          SUBSCRIPTIONS_JSON: ${{ secrets.PUSH_SUBSCRIPTIONS }}
        run: node .github/scripts/send-push.js
