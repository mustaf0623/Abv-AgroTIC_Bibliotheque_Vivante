name: AgroTIC — Notifications Push

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install web-push
        run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          node << 'EOF'
          const webpush = require('./node_modules/web-push');
          const https   = require('https');

          const VAPID_PUBLIC  = process.env.VAPID_PUBLIC_KEY;
          const VAPID_PRIVATE = process.env.VAPID_PRIVATE_KEY;
          const VAPID_EMAIL   = process.env.VAPID_EMAIL || 'mailto:agrotic@ussein.sn';
          const GIST_ID       = process.env.GIST_ID;
          const GIST_TOKEN    = process.env.GIST_TOKEN;
          const GIST_FILE     = 'subscriptions.json';

          function request(url, method, headers, body) {
            return new Promise((resolve, reject) => {
              const u = new URL(url);
              const opts = { hostname: u.hostname, path: u.pathname + u.search, method: method || 'GET', headers: headers || {} };
              const req = https.request(opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(d) }); }
                  catch(e) { resolve({ status: res.statusCode, body: d }); }
                });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function main() {
            if (!VAPID_PUBLIC || !VAPID_PRIVATE) {
              console.error('[AgroTIC] VAPID keys manquantes.'); process.exit(1);
            }
            if (!GIST_ID || !GIST_TOKEN) {
              console.error('[AgroTIC] GIST_ID ou GIST_TOKEN manquants.'); process.exit(1);
            }

            webpush.setVapidDetails(VAPID_EMAIL, VAPID_PUBLIC, VAPID_PRIVATE);

            // Lire les subscriptions depuis le Gist
            console.log('[AgroTIC] Lecture des abonnes depuis Gist...');
            const gistRes = await request(
              'https://api.github.com/gists/' + GIST_ID,
              'GET',
              { 'Authorization': 'token ' + GIST_TOKEN, 'Accept': 'application/vnd.github.v3+json', 'User-Agent': 'AgroTIC-PWA' }
            );

            if (gistRes.status !== 200) {
              console.error('[AgroTIC] Erreur lecture Gist:', gistRes.status, JSON.stringify(gistRes.body));
              process.exit(1);
            }

            const fileContent = gistRes.body.files[GIST_FILE] && gistRes.body.files[GIST_FILE].content;
            if (!fileContent) {
              console.log('[AgroTIC] Fichier subscriptions.json vide ou introuvable dans le Gist.');
              process.exit(0);
            }

            let subscriptions = [];
            try { subscriptions = JSON.parse(fileContent); } 
            catch(e) { console.log('[AgroTIC] JSON invalide dans Gist.'); process.exit(0); }

            console.log('[AgroTIC] ' + subscriptions.length + ' abonne(s) trouve(s).');

            if (!subscriptions.length) {
              console.log('[AgroTIC] Aucun abonne. Pipeline OK.');
              process.exit(0);
            }

            const payload = JSON.stringify({
              title: 'AgroTIC - Nouvelle notion disponible',
              body: "Une nouvelle notion t'attend. Ouvre l'app pour gagner des XP !",
              icon: '/Abv-AgroTIC_Bibliotheque_Vivante/icon-192.png',
              badge: '/Abv-AgroTIC_Bibliotheque_Vivante/icon-192.png',
              tag: 'agrotic-scheduled',
              url: '/Abv-AgroTIC_Bibliotheque_Vivante/'
            });

            let sent = 0, failed = 0, expired = 0;
            const validSubs = [];

            for (const sub of subscriptions) {
              try {
                await webpush.sendNotification(sub, payload);
                sent++; validSubs.push(sub);
                console.log('[AgroTIC] Envoye a:', sub.endpoint.slice(0, 60) + '...');
              } catch(err) {
                if (err.statusCode === 404 || err.statusCode === 410) {
                  console.log('[AgroTIC] Abonnement expire supprime.'); expired++;
                } else {
                  console.error('[AgroTIC] Erreur push:', err.message); failed++; validSubs.push(sub);
                }
              }
            }

            console.log('[AgroTIC] ' + sent + ' envoyes | ' + failed + ' erreurs | ' + expired + ' expires');

            // Mettre à jour le Gist si des abonnements ont expiré
            if (expired > 0) {
              const newContent = JSON.stringify(validSubs);
              const patchBody  = JSON.stringify({ files: { [GIST_FILE]: { content: newContent } } });
              await request(
                'https://api.github.com/gists/' + GIST_ID,
                'PATCH',
                {
                  'Authorization': 'token ' + GIST_TOKEN,
                  'Accept': 'application/vnd.github.v3+json',
                  'Content-Type': 'application/json',
                  'User-Agent': 'AgroTIC-PWA',
                  'Content-Length': Buffer.byteLength(patchBody)
                },
                patchBody
              );
              console.log('[AgroTIC] Gist mis a jour (' + validSubs.length + ' abonnes restants).');
            }
          }

          main().catch(err => { console.error('[AgroTIC] Erreur fatale:', err); process.exit(1); });
          EOF
